name: cdk-deploy-dev

on:
  push:
    branches:
      - dev
    paths:
      - 'infra/**'
      - '.github/workflows/cdk-deploy-dev.yml'
      - '.github/workflows/cdk-validate-reusable.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  resolve-config:
    name: resolve-dev-config
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      aws_role_arn: ${{ steps.vars.outputs.aws_role_arn }}
    steps:
      - id: vars
        run: |
          if [ -z "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "::error::AWS_ROLE_ARN is empty in GitHub Environment 'dev'."
            echo "GitHub → Settings → Environments → dev → Environment variables"
            exit 1
          fi
          echo "aws_role_arn=${{ vars.AWS_ROLE_ARN }}" >> "$GITHUB_OUTPUT"

  validate:
    needs: resolve-config
    uses: ./.github/workflows/cdk-validate-reusable.yml
    secrets: inherit
    with:
      aws_role_arn: ${{ needs.resolve-config.outputs.aws_role_arn }}
      deployment_environment: dev
      upload_artifact: false

  deploy:
    name: cdk-deploy-dev
    needs: [resolve-config, validate]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub Environment variables
        run: |
          if [ -z "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "::error::AWS_ROLE_ARN is empty in GitHub Environment 'dev'."
            echo "GitHub → Settings → Environments → dev → Environment variables"
            echo "Set AWS_ROLE_ARN to the afro90s-github-cdk-dev role ARN"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate dev access secrets
        run: |
          if [ -z "${{ secrets.DEV_ACCESS_ALLOWED_IPS }}" ] || \
             [ -z "${{ secrets.DEV_ACCESS_BASIC_AUTH_USERNAME }}" ] || \
             [ -z "${{ secrets.DEV_ACCESS_BASIC_AUTH_PASSWORD }}" ]; then
            echo "::error::Dev access secrets missing in GitHub Environment 'dev'."
            echo "Settings → Environments → dev → Environment secrets:"
            echo "  DEV_ACCESS_ALLOWED_IPS (JSON array, e.g. [\"203.0.113.0/24\"])"
            echo "  DEV_ACCESS_BASIC_AUTH_USERNAME"
            echo "  DEV_ACCESS_BASIC_AUTH_PASSWORD"
            exit 1
          fi

      - name: Install and build
        working-directory: infra
        run: npm ci && npm run build

      - name: CDK bootstrap
        working-directory: infra
        run: npm run bootstrap:dev

      - name: Deploy (dev)
        working-directory: infra
        env:
          AFRO90S_DEV_ACCESS_ALLOWED_IPS: ${{ secrets.DEV_ACCESS_ALLOWED_IPS }}
          AFRO90S_DEV_ACCESS_BASIC_AUTH_USERNAME: ${{ secrets.DEV_ACCESS_BASIC_AUTH_USERNAME }}
          AFRO90S_DEV_ACCESS_BASIC_AUTH_PASSWORD: ${{ secrets.DEV_ACCESS_BASIC_AUTH_PASSWORD }}
        run: npm run deploy:dev -- --require-approval never

      - name: Export outputs
        run: bash infra/scripts/export-outputs.sh dev

      - name: Smoke test (phase 1)
        run: bash infra/scripts/smoke-test-fase1.sh dev

      - name: Smoke test (phase 2)
        run: bash infra/scripts/smoke-test-fase2.sh dev

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: outputs-dev
          path: infra/outputs-dev.json
          if-no-files-found: error
          retention-days: 30
