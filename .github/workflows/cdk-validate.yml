name: cdk-validate

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/cdk-*.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1

jobs:
  validate:
    name: cdk-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository variables
        run: |
          if [ -z "${{ vars.AWS_ROLE_ARN_PR }}" ]; then
            echo "::error::AWS_ROLE_ARN_PR vazio nas Repository variables."
            echo "GitHub → Settings → Secrets and variables → Actions → Variables"
            echo "Adicione AWS_ROLE_ARN_PR = ARN da role afro90s-github-cdk-pr"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_PR }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Synth (dev)
        run: npm run synth:dev

      - name: Diff (dev)
        run: npm run diff:dev
        continue-on-error: true

      - name: Upload cdk.out artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-out-dev
          path: infra/cdk.out/
          if-no-files-found: error
          retention-days: 7
