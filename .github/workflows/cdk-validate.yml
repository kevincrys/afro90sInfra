name: cdk-validate

on:
  pull_request:
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    name: cdk-validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_PR }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Synth (dev)
        run: npm run synth:dev

      - name: Diff (dev)
        run: npm run diff:dev
        continue-on-error: true

      - name: Upload cdk.out artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-out-dev
          path: infra/cdk.out/
          retention-days: 7
